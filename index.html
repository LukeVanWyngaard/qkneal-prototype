<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Qkneal Monitor</title>
<style>
  body { font-family: Arial; padding: 40px; }
  input, button { padding: 10px; font-size: 16px; }
  #output { margin-top: 20px; }
</style>
</head>
<script src="checkListing.js"></script>
<body>
<h1>Qkneal Listing Monitor</h1>
<input id="urlInput" placeholder="Paste Facebook listing URL" size="50"/>
<button onclick="checkListing()">Check Status</button>
<div id="output"></div>

<script>
async function checkListing() {
  const url = document.getElementById('urlInput').value;
  if (!url) return alert("Enter a URL");
  
  const res = await fetch('/.netlify/functions/checkListing', {
    method: 'POST',
    body: JSON.stringify({ url }),
  });
  const data = await res.json();
  document.getElementById('output').innerText = `Status: ${data.status}`;
}
</script>
</body>
</html>
